<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Arb Tracker" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Arb Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .wrap {
      padding: 1rem;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .04em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span { color: #ff8c00; }

    /* Totals */
    .totals {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 1.25rem;
    }
    .stat {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 11px 13px;
    }
    .stat-label {
      font-size: 10px;
      color: #999;
      margin-bottom: 5px;
      letter-spacing: .07em;
      text-transform: uppercase;
    }
    .stat-val { font-size: 20px; font-weight: 700; }
    .stat-val.pos { color: #00e676; }
    .stat-val.neg { color: #ff5252; }

    /* Calendar */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .85rem;
    }
    .month-label { font-size: 15px; font-weight: 600; color: #fff; }
    .nav-btn {
      background: #1c1c1c;
      border: 1px solid #444;
      color: #ff8c00;
      font-size: 20px;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-btn:active { background: #2a2a2a; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 1.25rem;
    }
    .day-name {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: #ff8c00;
      padding: 4px 0;
      letter-spacing: .05em;
    }
    .cal-day {
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      min-height: 48px;
      padding: 5px 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .12s;
    }
    .cal-day:active { border-color: #ff8c00; }
    .cal-day.empty { background: transparent; border-color: transparent; pointer-events: none; }
    .cal-day.today { border-color: #ff8c0088; }
    .cal-day.selected { border-color: #ff8c00; background: #251400; }
    .day-num { font-size: 10px; font-weight: 500; color: #777; }
    .cal-day.today .day-num, .cal-day.selected .day-num { color: #ff8c00; }
    .day-profit { font-size: 10px; font-weight: 600; margin-top: 2px; }
    .day-profit.pos { color: #00e676; }
    .day-profit.neg { color: #ff5252; }

    /* Divider */
    .divider { height: 1px; background: #2a2a2a; margin-bottom: 1rem; }

    /* Form */
    .section-label {
      font-size: 10px;
      color: #777;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: .6rem;
    }
    .sel-date-label {
      font-size: 13px;
      color: #ff8c00;
      margin-bottom: .75rem;
      font-weight: 600;
    }
    .form-card {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .fi {
      width: 100%;
      background: #141414;
      border: 1px solid #333;
      border-radius: 8px;
      color: #eee;
      font-size: 14px;
      padding: 10px 10px;
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
    }
    .fi::placeholder { color: #555; }
    .fi:focus { border-color: #ff8c00; background: #1e1000; }

    .hedge-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 10px 12px;
      background: #141414;
      border: 1px solid #333;
      border-radius: 8px;
    }
    .hedge-label { font-size: 13px; color: #ccc; font-weight: 500; }
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #666;
      border-radius: 50%;
      transition: .2s;
    }
    .toggle input:checked + .slider { background: #ff8c00; }
    .toggle input:checked + .slider:before { transform: translateX(18px); background: #fff; }
    .toggle-state { font-size: 12px; color: #777; min-width: 22px; }
    .toggle-state.on { color: #ff8c00; }

    .hedge-fields {
      margin-bottom: 8px;
      padding: 10px;
      background: #1a0e00;
      border: 1px solid #3d2200;
      border-radius: 8px;
    }
    .hedge-title {
      font-size: 10px;
      color: #ff8c00;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .add-btn {
      width: 100%;
      margin-top: 6px;
      background: #ff8c00;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: .03em;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { background: #cc7000; }

    /* Bets list */
    .bets-section { margin-top: 1.25rem; }
    .bet-row {
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .bet-row.has-hedge .bet-row-main { cursor: pointer; }
    .bet-row-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .bet-book { font-size: 14px; color: #f0f0f0; font-weight: 600; }
    .bet-meta { font-size: 11px; color: #777; margin-top: 2px; }
    .bet-right { display: flex; align-items: center; gap: 8px; }
    .bet-profit { font-size: 14px; font-weight: 700; }
    .bet-profit.pos { color: #00e676; }
    .bet-profit.neg { color: #ff5252; }

    .bet-total-pill {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 4px 8px;
      background: #1a0e00;
      border: 1px solid #3d2200;
      border-radius: 6px;
    }
    .bet-total-label { font-size: 9px; color: #cc7700; letter-spacing: .07em; text-transform: uppercase; margin-bottom: 1px; }
    .bet-total-val { font-size: 12px; font-weight: 700; color: #ff8c00; }

    .hedge-badge {
      font-size: 10px;
      background: #3d2200;
      color: #ff8c00;
      border: 1px solid #5a3300;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .odds-tag {
      font-size: 10px;
      color: #ff8c00;
      background: #251400;
      border: 1px solid #3d2200;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .del {
      background: none;
      border: none;
      color: #555;
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .del:active { color: #ff5252; }

    .expand-icon {
      font-size: 12px;
      color: #ff8c00;
      transition: transform .2s;
      display: inline-block;
      line-height: 1;
    }
    .bet-row.open .expand-icon { transform: rotate(180deg); }

    .hedge-detail {
      display: none;
      padding: 10px 12px 12px;
      background: #1a0e00;
      border-top: 1px solid #3d2200;
    }
    .bet-row.open .hedge-detail { display: block; }
    .hedge-detail-title {
      font-size: 10px;
      color: #ff8c00;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .hedge-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .hd-item {
      background: #201200;
      border: 1px solid #3d2200;
      border-radius: 6px;
      padding: 7px 9px;
    }
    .hd-label { font-size: 9px; color: #996600; letter-spacing: .07em; text-transform: uppercase; margin-bottom: 3px; }
    .hd-val { font-size: 13px; color: #ffbb55; font-weight: 600; }

    .empty-bets { text-align: center; padding: 2rem; font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎯 Arb <span>Tracker</span></h1>

    <div class="totals" id="totals"></div>

    <div class="cal-header">
      <button class="nav-btn" id="prev">&#8249;</button>
      <div class="month-label" id="month-label"></div>
      <button class="nav-btn" id="next">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal"></div>

    <div class="divider"></div>
    <div class="section-label">Log a bet</div>
    <div class="sel-date-label" id="sel-label"></div>

    <div class="form-card">
      <div class="form-row">
        <input class="fi" id="f-book" placeholder="Bookmaker" autocomplete="off" />
        <input class="fi" id="f-odds" placeholder="Odds" autocomplete="off" />
      </div>
      <div class="form-row-3">
        <input class="fi" id="f-stake" type="number" placeholder="Stake ($)" step="0.01" min="0" inputmode="decimal" />
        <input class="fi" id="f-profit" type="number" placeholder="P/L ($)" step="0.01" inputmode="decimal" />
        <input class="fi" id="f-notes" placeholder="Notes" autocomplete="off" />
      </div>

      <div class="hedge-row">
        <span class="hedge-label">Was it a hedge?</span>
        <div class="toggle-wrap">
          <span class="toggle-state" id="toggle-state">No</span>
          <label class="toggle">
            <input type="checkbox" id="hedge-toggle" />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div id="hedge-fields" style="display:none">
        <div class="hedge-fields">
          <div class="hedge-title">Hedge details</div>
          <div class="form-row">
            <input class="fi" id="h-book" placeholder="Hedge bookmaker" autocomplete="off" />
            <input class="fi" id="h-stake" type="number" placeholder="Hedge stake ($)" step="0.01" min="0" inputmode="decimal" />
          </div>
          <div class="form-row">
            <input class="fi" id="h-odds" placeholder="Hedge odds" autocomplete="off" />
            <input class="fi" id="h-profit" type="number" placeholder="Hedge P/L ($)" step="0.01" inputmode="decimal" />
          </div>
        </div>
      </div>

      <button class="add-btn" id="add-btn">+ Add Bet</button>
    </div>

    <div class="bets-section">
      <div class="section-label" id="bets-title" style="margin-top:.25rem"></div>
      <div id="bets-list"></div>
    </div>
  </div>

  <script>
    const KEY = 'arb_tracker_data';
    let data = {}, cur = new Date(), selDate = new Date().toISOString().slice(0, 10);

    function load() {
      try { const raw = localStorage.getItem(KEY); if (raw) data = JSON.parse(raw); } catch(e) { data = {}; }
      render();
    }
    function save() { try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {} }

    function fmt(n, sign = true) {
      return (sign ? (n >= 0 ? '+' : '-') : (n < 0 ? '-' : '')) + '$' + Math.abs(n).toFixed(2);
    }
    function dayTotal(d) { return (data[d] || []).reduce((s, b) => s + b.profit, 0); }

    function getWeekRange() {
      const now = new Date(), day = now.getDay(), sun = new Date(now);
      sun.setDate(now.getDate() - day); sun.setHours(0,0,0,0);
      const sat = new Date(sun); sat.setDate(sun.getDate() + 6);
      return { sun, sat };
    }
    function weekTotal() {
      const { sun, sat } = getWeekRange();
      return Object.keys(data).reduce((t, d) => {
        const dt = new Date(d + 'T12:00:00');
        return (dt >= sun && dt <= sat) ? t + dayTotal(d) : t;
      }, 0);
    }

    function render() { renderTotals(); renderCal(); renderBets(); }

    function renderTotals() {
      const today = new Date().toISOString().slice(0, 10);
      const ms = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
      const mT = Object.keys(data).filter(d => d.startsWith(ms)).reduce((s,d) => s + dayTotal(d), 0);
      const aT = Object.keys(data).reduce((s,d) => s + dayTotal(d), 0);
      const tT = dayTotal(today), wT = weekTotal();
      const card = (label, val) =>
        `<div class="stat"><div class="stat-label">${label}</div><div class="stat-val ${val>=0?'pos':'neg'}">${fmt(val,false)}</div></div>`;
      document.getElementById('totals').innerHTML =
        card('Today', tT) + card('This week', wT) + card('This month', mT) + card('All time', aT);
    }

    function renderCal() {
      const y = cur.getFullYear(), m = cur.getMonth();
      document.getElementById('month-label').textContent =
        new Date(y, m, 1).toLocaleDateString('en', { month: 'long', year: 'numeric' });
      const first = new Date(y, m, 1).getDay(), days = new Date(y, m+1, 0).getDate();
      const today = new Date().toISOString().slice(0, 10);
      const { sun, sat } = getWeekRange();
      let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
        .map(d => `<div class="day-name">${d}</div>`).join('');
      for (let i = 0; i < first; i++) html += `<div class="cal-day empty"></div>`;
      for (let d = 1; d <= days; d++) {
        const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const t = dayTotal(ds), hasBets = (data[ds] || []).length > 0;
        const dt = new Date(ds + 'T12:00:00'), inWeek = dt >= sun && dt <= sat;
        const cls = ['cal-day', ds===today?'today':'', ds===selDate?'selected':''].filter(Boolean).join(' ');
        const extra = inWeek && ds!==selDate && ds!==today ? 'border-color:#3d2200;' : '';
        html += `<div class="${cls}" style="${extra}" onclick="selectDay('${ds}')">
          <div class="day-num">${d}</div>
          ${hasBets ? `<div class="day-profit ${t>=0?'pos':'neg'}">${fmt(t,false)}</div>` : ''}
        </div>`;
      }
      document.getElementById('cal').innerHTML = html;
    }

    function renderBets() {
      const bets = data[selDate] || [];
      const d = new Date(selDate + 'T12:00:00');
      const label = d.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
      document.getElementById('sel-label').textContent = `Logging for ${label}`;
      document.getElementById('bets-title').textContent = `Bets — ${label}`;
      if (!bets.length) {
        document.getElementById('bets-list').innerHTML = `<div class="empty-bets">No bets logged.</div>`;
        return;
      }
      document.getElementById('bets-list').innerHTML = bets.map((b, i) => {
        const hasHedge = !!b.hedge;
        const totalStake = hasHedge ? (b.stake||0) + (b.hedge.stake||0) : 0;
        const totalPill = hasHedge ? `
          <div class="bet-total-pill">
            <div class="bet-total-label">Total bet</div>
            <div class="bet-total-val">$${totalStake.toFixed(2)}</div>
          </div>` : '';
        const hedgePanel = hasHedge ? `
          <div class="hedge-detail">
            <div class="hedge-detail-title">Hedge details</div>
            <div class="hedge-detail-grid">
              <div class="hd-item"><div class="hd-label">Bookmaker</div><div class="hd-val">${b.hedge.book||'—'}</div></div>
              <div class="hd-item"><div class="hd-label">Stake</div><div class="hd-val">$${(b.hedge.stake||0).toFixed(2)}</div></div>
              <div class="hd-item"><div class="hd-label">Odds</div><div class="hd-val">${b.hedge.odds||'—'}</div></div>
              <div class="hd-item"><div class="hd-label">Profit</div><div class="hd-val" style="color:${(b.hedge.profit||0)>=0?'#00e676':'#ff5252'}">${fmt(b.hedge.profit||0)}</div></div>
            </div>
          </div>` : '';
        const oddsTag = b.odds ? `<span class="odds-tag">${b.odds}</span>` : '';
        return `<div class="bet-row${hasHedge?' has-hedge':''}" id="bet-${i}">
          <div class="bet-row-main" ${hasHedge ? `onclick="toggleHedge(${i})"` : ''}>
            <div>
              <div class="bet-book">${b.book||'—'}${oddsTag}${hasHedge?'<span class="hedge-badge">hedge</span>':''}</div>
              <div class="bet-meta">stake $${b.stake.toFixed(2)}${b.notes?' · '+b.notes:''}</div>
            </div>
            <div class="bet-right">
              ${totalPill}
              <div class="bet-profit ${b.profit>=0?'pos':'neg'}">${fmt(b.profit)}</div>
              ${hasHedge ? `<span class="expand-icon">▾</span>` : ''}
              <button class="del" onclick="event.stopPropagation();delBet('${selDate}',${i})">✕</button>
            </div>
          </div>
          ${hedgePanel}
        </div>`;
      }).join('');
    }

    window.toggleHedge = function(i) {
      const el = document.getElementById('bet-' + i);
      if (el) el.classList.toggle('open');
    };
    window.selectDay = d => { selDate = d; render(); };
    window.delBet = (d, i) => {
      data[d].splice(i, 1);
      if (!data[d].length) delete data[d];
      save(); render();
    };

    document.getElementById('hedge-toggle').addEventListener('change', function() {
      const on = this.checked;
      document.getElementById('hedge-fields').style.display = on ? 'block' : 'none';
      const ts = document.getElementById('toggle-state');
      ts.textContent = on ? 'Yes' : 'No';
      ts.className = 'toggle-state' + (on ? ' on' : '');
    });

    document.getElementById('add-btn').addEventListener('click', () => {
      const book = document.getElementById('f-book').value.trim();
      const odds = document.getElementById('f-odds').value.trim();
      const stake = parseFloat(document.getElementById('f-stake').value) || 0;
      const profit = parseFloat(document.getElementById('f-profit').value);
      const notes = document.getElementById('f-notes').value.trim();
      const isHedge = document.getElementById('hedge-toggle').checked;
      if (isNaN(profit)) return;

      const entry = { book, odds, stake, profit, notes, id: Date.now() };
      if (isHedge) {
        entry.hedge = {
          book: document.getElementById('h-book').value.trim(),
          stake: parseFloat(document.getElementById('h-stake').value) || 0,
          odds: document.getElementById('h-odds').value.trim(),
          profit: parseFloat(document.getElementById('h-profit').value) || 0
        };
      }

      if (!data[selDate]) data[selDate] = [];
      data[selDate].push(entry);
      save(); render();

      ['f-book','f-odds','f-stake','f-profit','f-notes','h-book','h-stake','h-odds','h-profit']
        .forEach(id => document.getElementById(id).value = '');
      document.getElementById('hedge-toggle').checked = false;
      document.getElementById('hedge-fields').style.display = 'none';
      const ts = document.getElementById('toggle-state');
      ts.textContent = 'No'; ts.className = 'toggle-state';
    });

    document.getElementById('prev').addEventListener('click', () => {
      cur = new Date(cur.getFullYear(), cur.getMonth()-1, 1); renderCal();
    });
    document.getElementById('next').addEventListener('click', () => {
      cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1); renderCal();
    });

    load();

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
